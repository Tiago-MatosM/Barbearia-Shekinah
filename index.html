<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Barbearia Shekinah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Barbearia Shekinah</h1>
    <div class="container">
        <div class="secao fila-secao">
            <div class="secao-header">
                <h2>Fila de Espera</h2>
                <button class="apagar-tudo-btn" id="apagarFila">Apagar Fila</button>
            </div>
            <label for="nomeFila">Nome do Cliente:</label>
            <input type="text" id="nomeFila">
            <button class="botao-principal" id="adicionarFila">Adicionar à Fila</button>
            <ul class="lista" id="listaFila"></ul>
            <div id="paginacaoFila" class="paginacao-container"></div>
            <div class="secao controle-caixa-secao"></div>
        </div>

        <div class="secao controle-caixa-secao">
            <div class="secao-header">
                <h2>Controle de Caixa</h2>
            </div>
            <label for="nomeCliente">Nome do Cliente:</label>
            <input type="text" id="nomeCliente">
            <label for="valorPago">Valor Pago:</label>
            <input type="number" id="valorPago">
            <button class="botao-principal" id="adicionarCliente">Adicionar</button>
            <hr>
            <h2>Clientes do Dia</h2>
            <ul class="lista" id="listaClientes"></ul>
            <div class="total-container">
                <p>Total Arrecadado: R$ <span id="totalValor">0.00</span></p>
                <button class="finalizar-btn" id="finalizarDia">Finalizar Dia</button>
            </div>
        </div>

        <div class="secao ganhos-mensais-secao">
            <div class="secao-header">
                <h2>Ganhos do Mês</h2>
                <button class="finalizar-btn" id="toggleGanhosBtn">Ocultar</button> <button class="apagar-tudo-btn" id="apagarGanhos">Apagar Tudo</button>
            </div>
            <ul class="lista" id="listaGanhosMensais"></ul>
            <p id="totalMensalContainer">Total do Mês: R$ <span id="totalMensal">0.00</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
